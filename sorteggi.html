<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist Example</title>
  <style>
    .button {
      display: inline-block;
      padding: 10px 20px;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<h2>Checklist</h2>

<!-- Unordered List (UL) for the checklist -->
<ul id="checklist">
  <!-- List Item (LI) for each item in the checklist -->
  <li><input type="checkbox" id="item1"> <label for="item1">Item 1</label></li>
  <li><input type="checkbox" id="item2"> <label for="item2">Item 2</label></li>
  <li><input type="checkbox" id="item3"> <label for="item3">Item 3</label></li>
  <!-- Add more items as needed -->
</ul>

<!-- Button to eliminate checked items, shuffle, and display the list -->
<button class="button" onclick="processChecklist()">Process Checklist</button>

<!-- Container for the shuffled list -->
<div id="shuffled-list-container"></div>

<script>
  function processChecklist() {
    // Get the <ul> element
    var checklist = document.getElementById('checklist');

    // Create a new array for unchecked items
    var uncheckedItems = [];

    // Iterate through each <li> in the checklist
    for (var i = 0; i < checklist.children.length; i++) {
      var listItem = checklist.children[i];

      // Check if the checkbox is unchecked
      if (!listItem.querySelector('input').checked) {
        uncheckedItems.push(listItem.textContent.trim());
      }
    }

    // Shuffle the array of unchecked items
    uncheckedItems.sort(function() {
      return 0.5 - Math.random();
    });

    // Create a new ordered list (OL) for the shuffled items
    var shuffledList = document.createElement('ol');

    // Populate the OL with LI elements based on the shuffled list
    uncheckedItems.forEach(function(itemText) {
      var li = document.createElement('li');
      li.textContent = itemText;
      shuffledList.appendChild(li);
    });

    // Get the container for the shuffled list
    var shuffledListContainer = document.getElementById('shuffled-list-container');

    // Clear previous content in the container
    shuffledListContainer.innerHTML = '';

    // Append the shuffled list to the container
    shuffledListContainer.appendChild(shuffledList);
  }
</script>

</body>
</html>
