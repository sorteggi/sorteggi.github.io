<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteggi</title>

      padding: 10px 20px;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>
<h2>Chi e' gia' andato?</h2>
<ul id="checklist">
  <li><input type="checkbox" id="Lorenzo baldassarre"> <label for="Lorenzo baldassarre">Lorenzo baldassarre</label</li>
  <li><input type="checkbox" id="Gloria chirico"> <label for="Gloria chirico">Gloria chirico</label></li>
  <li><input type="checkbox" id="Elena ciriolo"> <label for="Elena ciriolo">Elena ciriolo</label></li>
  <li><input type="checkbox" id="Achille de donno"> <label for="Achille de donno">Achille de donno</label></li>
  <li><input type="checkbox" id="Carlo de iaco"> <label for="Carlo de iaco">Carlo de iaco</label></li>
  <li><input type="checkbox" id="Cristina donno"> <label for="Cristina donno">Cristina donno</label></li>
  <li><input type="checkbox" id="Matteo fersini"> <label for="Matteo fersini">Matteo fersini</label></li>
  <li><input type="checkbox" id="Andrea franco"> <label for="Andrea franco">Andrea franco</label></li>
  <li><input type="checkbox" id="Sarah gemma"> <label for="Sarah gemma">Sarah gemma</label></li>
  <li><input type="checkbox" id="Simone greco"> <label for="Simone greco">Simone greco</label></li>
  <li><input type="checkbox" id="Sofia greco"> <label for="Sofia greco">Sofia greco</label></li>
  <li><input type="checkbox" id="Giulio leo"> <label for="Giulio leo">Giulio leo</label></li>
  <li><input type="checkbox" id="Riccardo mangione"> <label for="Riccardo mangione">Riccardo mangione</label></li>
  <li><input type="checkbox" id="Federico melcore"> <label for="Federico melcore">Federico melcore</label></li>
  <li><input type="checkbox" id="Angelo mitruccio"> <label for="Angelo mitruccio">Angelo mitruccio</label></li>
  <li><input type="checkbox" id="Silvia palma"> <label for="Silvia palma">Silvia palma</label></li>
  <li><input type="checkbox" id="Marco pino"> <label for="Marco pino">Marco pino</label></li>
  <li><input type="checkbox" id="Nicolo' Russo"> <label for="Nicolo' Russo">Nicolo' Russo</label></li>
  <li><input type="checkbox" id="Matteo saponaro"> <label for="Matteo saponaro">Nicolo' Russo</label></li>

  <li><input type="checkbox" id="Giuseppe urso"> <label for="Giuseppe urso">Nicolo' Russo</label></li>
  <li><input type="checkbox" id="Matilde vecchio"> <label for="Matilde vecchio">Nicolo' Russo</label></li>
</ul>
<button class="button" onclick="processChecklist()">Sorteggia</button>
<div id="shuffled-list-container"></div>
<script>
  function processChecklist() {
    var checklist = document.getElementById('checklist');
    var uncheckedItems = [];
    for (var i = 0; i < checklist.children.length; i++) {
      var listItem = checklist.children[i];
      if (!listItem.querySelector('input').checked) {
        uncheckedItems.push(listItem.textContent.trim());
      }
    }
    uncheckedItems.sort(function() {
      return 0.5 - Math.random();
    });
    var shuffledList = document.createElement('ol');
    uncheckedItems.forEach(function(itemText) {
      var li = document.createElement('li');
      li.textContent = itemText;
      shuffledList.appendChild(li);
    });
    var shuffledListContainer = document.getElementById('shuffled-list-container');
    shuffledListContainer.innerHTML = '';
    shuffledListContainer.appendChild(shuffledList);
  }
</script>
</body>
</html>
